<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sluice Gate – Live Data Stream (Simulated)</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0f1e; font-family: 'Courier New', monospace; color: #e0e0e0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #0f172a; border-radius: 24px; padding: 24px; border: 1px solid #1e293b; }
        h1 { color: #00f2fe; margin-bottom: 16px; }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin: 24px 0; }
        .stat-card { background: #010409; border-radius: 16px; padding: 20px; text-align: center; border: 1px solid #2d3748; }
        .stat-value { font-size: 2.5rem; font-weight: bold; color: #00f2fe; }
        .stat-label { font-size: 0.8rem; color: #94a3b8; margin-top: 8px; }
        .log { background: #010409; border-radius: 16px; padding: 16px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 0.8rem; border: 1px solid #2d3748; margin: 20px 0; }
        .button-bar { display: flex; gap: 12px; flex-wrap: wrap; margin: 20px 0; }
        button { background: #1e293b; border: none; color: #94a3b8; padding: 8px 20px; border-radius: 40px; cursor: pointer; font-family: monospace; font-size: 1rem; transition: 0.2s; }
        button:hover { background: #2d3a5e; color: white; }
        .start { background: #00f2fe; color: #010409; }
        .test { background: #fbbf24; color: #010409; }
        .resume { background: #3b82f6; color: white; }
        .end { background: #ef4444; color: white; }
        footer { text-align: center; margin-top: 20px; font-size: 0.7rem; color: #475569; }
    </style>
</head>
<body>
<div class="container">
    <h1>⚡ Sluice Gate – Live Data Stream</h1>
    <p>Simulated live data · Filtered by <code>is_ripe()</code> · No external API needed</p>

    <div class="button-bar">
        <button id="startBtn" class="start">▶ START</button>
        <button id="testBtn" class="test">🔍 TEST</button>
        <button id="resumeBtn" class="resume">⏸️ RESUME</button>
        <button id="endBtn" class="end">⏹️ END</button>
    </div>

    <div class="stat-grid">
        <div class="stat-card"><div class="stat-value" id="total">0</div><div class="stat-label">Total Data Points</div></div>
        <div class="stat-card"><div class="stat-value" id="ripe">0</div><div class="stat-label">RIPE Points</div></div>
        <div class="stat-card"><div class="stat-value" id="rejection">0%</div><div class="stat-label">Rejection Rate</div></div>
        <div class="stat-card"><div class="stat-value" id="energy">0 kWh</div><div class="stat-label">Energy Saved</div></div>
    </div>

    <div class="log" id="log">Ready. Click START to begin.</div>

    <footer>Your is_ripe() filter runs on every generated value · Simulated stream, but real filter logic</footer>
</div>

<script>
    // Your is_ripe() function – same logic as your egg‑sorter
    function isRipe(value) {
        if (value % 5 !== 0) return false;
        if (value < 0x100000 || value > 0x20000000) return false;
        if ((value & 0xF) !== 0xC) return false;
        return true;
    }

    let total = 0, ripeCount = 0;
    let interval = null;
    let running = false;
    let paused = false;

    const totalSpan = document.getElementById('total');
    const ripeSpan = document.getElementById('ripe');
    const rejectionSpan = document.getElementById('rejection');
    const energySpan = document.getElementById('energy');
    const logDiv = document.getElementById('log');

    function addLog(msg) {
        const p = document.createElement('div');
        p.textContent = new Date().toLocaleTimeString() + ' > ' + msg;
        logDiv.appendChild(p);
        p.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        while (logDiv.children.length > 100) logDiv.removeChild(logDiv.firstChild);
    }

    function updateUI() {
        totalSpan.textContent = total;
        ripeSpan.textContent = ripeCount;
        const rate = total === 0 ? 0 : (1 - ripeCount / total) * 100;
        rejectionSpan.textContent = rate.toFixed(2) + '%';
        energySpan.textContent = (total * 0.00000001).toFixed(8) + ' kWh';
    }

    function generateDataPoint() {
        // Simulate a realistic value (like a temperature reading or a nonce)
        const base = 0x100000 + Math.floor(Math.random() * 0x20000000);
        const mod = Math.floor(Math.random() * 20);
        const value = mod === 0 ? base + 0xC : base + mod;
        return value;
    }

    function tick() {
        if (!running || paused) return;
        const value = generateDataPoint();
        total++;
        const ripe = isRipe(value);
        if (ripe) ripeCount++;
        updateUI();
        addLog(`${ripe ? '🎯 RIPE' : '❌ REJECTED'} data: ${value} (hex: ${value.toString(16)})`);
    }

    function startStream() {
        if (interval) clearInterval(interval);
        running = true;
        paused = false;
        interval = setInterval(tick, 2000); // new data every 2 seconds
        addLog('✅ Stream started (2 seconds interval).');
    }

    function testOnce() {
        if (interval) clearInterval(interval);
        running = false;
        paused = false;
        tick();
        addLog('🔍 Single test completed.');
    }

    function resumeStream() {
        if (!running || paused) {
            paused = false;
            running = true;
            if (interval) clearInterval(interval);
            interval = setInterval(tick, 2000);
            addLog('▶️ Stream resumed.');
        }
    }

    function endStream() {
        if (interval) clearInterval(interval);
        running = false;
        paused = false;
        total = 0; ripeCount = 0;
        updateUI();
        logDiv.innerHTML = '⏹️ Stream ended. Ready. Click START to begin.';
        addLog('Stream reset.');
    }

    document.getElementById('startBtn').onclick = startStream;
    document.getElementById('testBtn').onclick = testOnce;
    document.getElementById('resumeBtn').onclick = resumeStream;
    document.getElementById('endBtn').onclick = endStream;
</script>
</body>
</html>
